<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FadFood - طلب وتوصيل</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <header class="app-header">
        <img src="logo.png" alt="FadFood Logo" class="app-logo">
        <h1>FadFood Delivery</h1>
    </header>

    <div class="container">
        
        <section id="loginSection" class="page-section">
            <h2>مرحباً بك!</h2>
            <p>سجل دخولك لتبدأ الطلب 🚀</p>
            <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </section>

        <section id="orderSection" class="page-section" style="display: none;">
            </section>

        <section id="trackingSection" class="page-section" style="display: none;">
            </section>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="customer.js"></script>
</body>
</html>
